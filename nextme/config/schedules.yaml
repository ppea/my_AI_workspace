scheduler:
  timezone: "Asia/Shanghai"
  store: sqlite
  store_path: data/reminders.db
  defaults:
    birthday: [7, 1, 0]
    deadline: [30, 14, 7, 3, 1]
    appointment: [1, 0]
    general: [3, 1]
  notification:
    primary: telegram
    fallback: cli
    quiet_hours:
      start: "22:00"
      end: "07:00"
      exceptions: ["urgent"]
