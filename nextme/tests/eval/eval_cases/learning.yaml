advisor: learning
cases:
  - id: learning_python
    query: "I want to learn Python. Where should I start?"
    expected_advisor_tag: learning
    mock_response:
      text: "Great choice! Python is very beginner-friendly. Recommended path: Start with Python.org's official tutorial or Codecademy's Python course (free), practice on platforms like LeetCode or HackerRank (start with 'Easy' problems), build small projects (calculator, todo list, web scraper), learn one popular library (pandas for data, Flask for web), and join Python communities on Reddit or Discord. Aim for 30-60 minutes daily rather than marathon sessions."
      advisor: learning
      action_items:
        - "Complete Python basics course (Codecademy or Python.org)"
        - "Solve 3 easy coding problems on HackerRank"
        - "Build first small project (calculator or todo list)"
      follow_ups:
        - "Do you have programming experience in other languages?"
        - "What do you want to build with Python?"
      caveat: null
    must_pass_hard_checks: true

  - id: learning_language
    query: "I want to become fluent in Spanish. What's the best approach?"
    expected_advisor_tag: learning
    mock_response:
      text: "¡Excelente! Language learning requires consistent practice across all skills. Structure: use Duolingo/Babbel for 15 min daily (foundation), watch Spanish TV shows with Spanish subtitles, practice speaking via italki or local language exchanges, learn 10 new words daily using Anki flashcards, and immerse yourself in Spanish music and podcasts. Fluency typically takes 600-750 hours of dedicated study. Set a realistic timeline of 1-2 years."
      advisor: learning
      action_items:
        - "Download Duolingo and commit to 15 min/day"
        - "Find Spanish TV show to watch (with Spanish subtitles)"
        - "Join online language exchange (italki, Tandem)"
        - "Create Anki deck for daily vocabulary"
      follow_ups:
        - "Do you know any Spanish currently?"
        - "Why do you want to learn Spanish?"
    must_pass_hard_checks: true

  - id: learning_productivity
    query: "How can I learn more effectively? I keep forgetting what I study."
    expected_advisor_tag: learning
    mock_response:
      text: "Great question! Effective learning techniques: Use spaced repetition (review material at increasing intervals), actively recall information instead of just re-reading, teach concepts to someone else or explain out loud, practice retrieval (quiz yourself frequently), connect new info to what you already know, take breaks every 25-50 minutes (Pomodoro), and sleep well—consolidation happens during sleep. Tools: Anki for flashcards, Notion for notes, Feynman technique for understanding."
      advisor: learning
      action_items:
        - "Download Anki and create first flashcard deck"
        - "Try Pomodoro technique (25 min study, 5 min break)"
        - "Teach one concept to someone this week"
      follow_ups:
        - "What subject are you currently studying?"
        - "How do you currently study?"
        - "How much sleep do you typically get?"
    must_pass_hard_checks: true
