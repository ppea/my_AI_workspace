rag:
  vector_store: chroma
  persist_dir: data/chroma/
  embedding:
    provider: openai
    model: text-embedding-3-small
  chunking:
    parser: markdown
    chunk_size: 512
    chunk_overlap: 50
  indexing:
    watch_dirs:
      - knowledge/
    ignore_patterns:
      - "*.tmp"
      - ".obsidian/"
    incremental: true
