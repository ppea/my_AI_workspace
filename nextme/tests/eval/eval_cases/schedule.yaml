advisor: schedule
cases:
  - id: schedule_time_management
    query: "I have 5 projects due next week. How should I prioritize?"
    expected_advisor_tag: schedule
    mock_response:
      text: "Let's create a manageable plan. First, list all 5 projects with deadlines and importance. Use the Eisenhower Matrix: urgent + important first, then important but not urgent. Block focused time for each: highest priority gets your peak energy hours. Break large projects into 2-hour chunks. Build in buffer time for unexpected issues. Consider which projects can be delegated or have deadlines extended."
      advisor: schedule
      action_items:
        - "List all projects with deadlines"
        - "Categorize by urgency and importance"
        - "Block calendar time for top 2 priorities today"
        - "Identify delegation opportunities"
      follow_ups:
        - "Which projects have the earliest deadlines?"
        - "Can any deadlines be negotiated?"
    must_pass_hard_checks: true

  - id: schedule_meeting_overload
    query: "My calendar is full of meetings and I have no time for deep work."
    expected_advisor_tag: schedule
    mock_response:
      text: "Meeting overload is draining! Try these strategies: block 2-hour 'focus time' blocks daily and mark them as busy, audit meetings—decline or delegate those you don't need to attend, propose 25-minute instead of 30-minute meetings, batch similar meetings together, and use 'meeting-free' mornings or afternoons. Communicate your focus time needs to your team."
      advisor: schedule
      action_items:
        - "Block 2-hour focus time for next 2 weeks"
        - "Review and decline unnecessary meetings"
        - "Set up 'meeting-free' morning/afternoon policy"
      follow_ups:
        - "Which meetings could you skip or delegate?"
        - "What's your most productive time of day?"
    must_pass_hard_checks: true

  - id: schedule_morning_routine
    query: "I want to establish a productive morning routine. Any suggestions?"
    expected_advisor_tag: schedule
    mock_response:
      text: "A strong morning routine sets your day up for success! Aim to wake at the same time daily. A sample 90-minute routine: wake up, hydrate (5 min), light exercise or stretching (20 min), shower (15 min), healthy breakfast (20 min), planning/journaling (15 min), review top 3 priorities (10 min). Start small—pick 1-2 elements and build from there. Consistency beats perfection."
      advisor: schedule
      action_items:
        - "Choose consistent wake-up time"
        - "Select 2 morning routine elements to start"
        - "Prepare evening before (lay out clothes, prep breakfast)"
      follow_ups:
        - "What time do you naturally wake up?"
        - "What are your current morning habits?"
    must_pass_hard_checks: true
