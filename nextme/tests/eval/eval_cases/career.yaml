advisor: career
cases:
  - id: career_resume_review
    query: "How can I improve my resume to get more interviews?"
    expected_advisor_tag: career
    mock_response:
      text: "Let's make your resume stand out! Key improvements: quantify achievements with metrics (e.g., 'increased sales by 30%'), tailor it to each job description using relevant keywords, use a clean ATS-friendly format, lead with a strong summary highlighting your unique value, and keep it to 1-2 pages. Focus on accomplishments, not just duties."
      advisor: career
      action_items:
        - "Add quantifiable metrics to each role"
        - "Customize resume for target positions"
        - "Review and update professional summary"
      follow_ups:
        - "What type of roles are you targeting?"
        - "What are your biggest achievements?"
      caveat: null
    must_pass_hard_checks: true

  - id: career_salary_negotiation
    query: "I got a job offer but the salary is lower than expected. How do I negotiate?"
    expected_advisor_tag: career
    mock_response:
      text: "Great that you received an offer! Research market rates for your role using Glassdoor, Payscale, and Levels.fyi. Express enthusiasm for the role, then professionally state your salary expectations backed by market data and your qualifications. Consider the entire package (benefits, equity, bonus) not just base salary. Be prepared to justify your number and have a minimum acceptable figure in mind."
      advisor: career
      action_items:
        - "Research market rates for similar roles"
        - "List your unique qualifications and achievements"
        - "Prepare negotiation talking points"
      follow_ups:
        - "What's the offered salary vs your expectations?"
        - "What's included in the benefits package?"
    must_pass_hard_checks: true

  - id: career_transition
    query: "I want to transition from marketing to product management. Where do I start?"
    expected_advisor_tag: career
    mock_response:
      text: "Great career move! Your marketing skills translate well to PM. Start by: learning PM fundamentals (courses on Reforge, Product School, or Udemy), building a portfolio of product case studies, highlighting transferable skills (customer research, data analysis, cross-functional collaboration), networking with PMs on LinkedIn, and seeking internal PM opportunities at your current company if possible."
      advisor: career
      action_items:
        - "Enroll in PM fundamentals course"
        - "Create product case study portfolio"
        - "Update LinkedIn to highlight PM-relevant skills"
        - "Schedule informational interviews with PMs"
      follow_ups:
        - "What aspects of marketing do you enjoy most?"
        - "Do you have any technical background?"
    must_pass_hard_checks: true
